project_id: '03'
title: "MacroRegime — Causal Macro/Market Regime Conditioning for Multi-Asset Allocation"
short_description: "A dual-frequency causal regime detection pipeline that conditions multi-asset allocation on macro and market regimes identified without look-ahead bias."
category: "Macro / Regimes"
tags: ["regime-detection", "HMM", "GMM", "macro", "multi-asset", "causal", "walk-forward"]
demo_type: sim_regime
headline_metric:
  name: "RP net Sharpe"
  value: "0.981"
technical_overview:
  summary: >
    MacroRegime tests whether conditioning a multi-asset portfolio on dual-frequency macro and
    market regimes — identified causally without look-ahead bias — produces superior risk-adjusted
    returns over three static benchmarks (60/40, Equal-Weight, Risk-Parity). A 4-state
    Markov-switching DGP generates correlated macro observations and asset returns sharing the
    same latent state process. Two separate CausalRegimeDetector instances handle macro (monthly
    publication-date indexed) and market (daily OHLCV-derived features) to avoid frequency-mixing
    artifacts. The causal oracle guarantee is: label at bar t is predict(X[:t+1])[-1], depending
    only on data up to t. All four strategies (Regime, 60/40, EqualWeight, RiskParity) run through
    an identical QBacktest engine path via build_strategy_engine, ensuring cost parity.
  pipeline:
    - "SyntheticMacroGenerator produces 4-state Markov-switching correlated macro + asset returns"
    - "SyntheticMacroLoader applies per-series release lags (CPI 13bd, UNRATE 7bd, GDP 30bd, T10Y2Y 1bd) and returns publication-date indexed panel"
    - "Expanding z-score standardization applied post-lag (not pre-lag) to avoid future mean/std leakage"
    - "CausalRegimeDetector (macro): predict(X[:t+1])[-1] pattern; refit schedule by bar index only"
    - "CausalRegimeDetector (market): daily OHLCV features (vol, momentum, drawdown, cross-asset corr)"
    - "build_weight_schedule constructs date-indexed target weights from aligned regime labels"
    - "build_strategy_engine routes all four strategies through identical EventDrivenBacktester config"
    - "WalkForwardRunner evaluates OOS performance over non-overlapping 126-bar test windows"
methodology:
  summary: >
    The causal refit pattern (predict(X[:t+1])[-1]) is the only safe pattern for HMMs: Viterbi
    decoding produces a smoothed state sequence where bar t depends on all future data. Discarding
    all bars except the final one guarantees a pure function of data up to t. Label alignment
    uses double argsort (not single argsort) to map raw state → economic rank. K=3 is fixed on
    economic interpretability grounds; K selection by Sharpe is explicitly rejected as an
    anti-feature. Walk-forward OOS net Sharpe is 0.103 across 16 windows (train 504 bars / test
    126 bars, quick mode).
  key_techniques:
    - "Causal refit oracle: predict(X[:t+1])[-1] prevents smoothed-state look-ahead (~55% disagreement vs predict(X)[t])"
    - "Publication-date indexed macro panel: ffill applied after lag, not before"
    - "Expanding z-score standardization (not full-sample) for causal feature normalization"
    - "Double argsort label alignment: state 0 always = lowest GDP growth = recession"
    - "Dual-frequency detector separation: macro and market detectors never share a feature matrix"
    - "Cost-parity single engine path: all four strategies use build_strategy_engine"
    - "K selection by BIC/dwell-time only; Sharpe-based K selection is an anti-feature (locked)"
    - "Bootstrap Sharpe 95% CI (1000 resamples) for all strategy comparisons"
correctness_guarantees:
  - "Causal oracle: label at bar t = predict(X[:t+1])[-1]; single argsort (predict(X)[t]) disagrees on ~55% of historical bars — tested by oracle test"
  - "PIT release lags: SyntheticMacroLoader returns publication-date indexed DataFrame; ffill occurs after lag application (Pitfall 5 prevention)"
  - "Cost parity single engine path: regime strategy and all three benchmarks route through build_strategy_engine with identical BacktestConfig (locked)"
  - "Weekend publication fix: macro publication-date calendar handles business-day offsets correctly (oracle test)"
  - "Walk-forward fold isolation: each window gets a fresh EventDrivenBacktester instance; no reset-based reuse"
dataset:
  name: "Synthetic 4-state Markov macro panel"
  description: >
    Fully synthetic 4-state Markov-switching DGP (Recession, Slow Growth, Expansion, Stagflation)
    producing correlated macro observables (CPI, UNRATE, GDP, T10Y2Y) and multi-asset returns
    (EQUITY, BONDS, COMMODITY, CASH) from a shared latent state process. Default: 30-year panel
    (quick mode: 10 years), seed=42. Fully offline and deterministic; optional FRED real-data path
    requires FRED_API_KEY.
