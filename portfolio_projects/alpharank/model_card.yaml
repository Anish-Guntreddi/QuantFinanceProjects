project_id: '02'
title: "AlphaRank — Cross-Sectional Factor Research Pipeline"
short_description: "A cross-sectional ML alpha research pipeline with deliberately planted signals, purged combinatorial CV, and T+1 decile long-short backtesting."
category: "ML Alpha"
tags: ["cross-sectional", "factor-research", "CPCV", "IC", "long-short", "synthetic-alpha"]
demo_type: sim_crosssection
headline_metric:
  name: "Mean IC (best model)"
  value: "0.0326"
technical_overview:
  summary: >
    AlphaRank evaluates four ML ranking models (equal-weight composite, linear regression,
    elastic net, LightGBM) on their ability to recover planted cross-sectional alpha from
    lagged z-scored factor features (momentum, reversal, volatility, value, quality, liquidity).
    All factors route through safe_shift(n>=1) preventing accidental look-ahead.
    A FeatureLeakageValidator asserts |Spearman IC with next-day returns| < 0.5 for every feature
    column at construction time. Out-of-sample evaluation uses CombinatorialPurgedCV(6,2,1,1)
    with 1-month purge and 1-month embargo. The backtest uses QBacktest (T+1 fills, 5 bps spread
    + 10 bps commission) on a decile long-short portfolio across a 50-asset synthetic universe
    with planted IC targets of 0.06 (momentum) and 0.04 (value).
  pipeline:
    - "CrossSectionalGenerator produces 50-asset × 60-month synthetic universe with planted alpha coefficients"
    - "Six factors constructed with safe_shift(n=1) and publication-lag ffill; FeatureLeakageValidator gates construction"
    - "make_labels computes 1-month forward percentile ranks via pct_change(1).shift(-1) then cross-sectional rank"
    - "CombinatorialPurgedCV(6,2,purge=1,embargo=1) generates 15 path combinations for OOS IC estimation"
    - "Four RankModels fit per fold; IC (Spearman) aggregated across paths with Newey-West HAC t-stats"
    - "Decile weights (top/bottom decile equal-weight) passed to run_decile_backtest via QBacktest engine"
    - "T+1 fills with SpreadSlippage(5bps) + PercentageCommission(0.10%); gross vs net Sharpe with 95% bootstrap CI"
    - "ReportBuilder writes IC comparison, IC decay, monthly IC series, equity curves, and LGBM tearsheet"
methodology:
  summary: >
    The pipeline is an explicit methodology showcase: alpha is deliberately planted so that
    models are expected to recover it. No hyperparameter tuning is performed; all four models
    use fixed hyperparameters throughout. CPCV (not KFold) is used to avoid information leakage
    across train/test boundaries on panel time-series data. IC (Spearman rank correlation) is
    the sole evaluation criterion — no accuracy metrics. The gross-vs-net gap is real and
    visible: linear and elastic-net both go negative after costs despite positive gross Sharpe.
  key_techniques:
    - "Planted alpha formula: alpha_coeff = IC_target * sigma_noise / sqrt(1 - IC_target^2)"
    - "safe_shift(n>=1) assertion prevents accidental look-ahead in factor construction"
    - "FeatureLeakageValidator: |Spearman IC next-day| < 0.5 gate at construction"
    - "CombinatorialPurgedCV(6,2,purge=1,embargo=1): 15 path combinations, no KFold"
    - "Newey-West HAC t-statistics with maxlags=floor(4*(T/100)^0.25)"
    - "T+1 decile long-short via QBacktest engine (SpreadSlippage + PercentageCommission)"
    - "IC decay analysis across 1, 2, 3, 6-month forward horizons"
    - "Bootstrap Sharpe 95% CI (percentile method)"
correctness_guarantees:
  - "Leakage validator: FeatureLeakageValidator asserts |Spearman IC with next-day returns| < 0.5 for every feature column at construction time (oracle test)"
  - "No KFold: CombinatorialPurgedCV enforced; a naive KFold path does not exist in the codebase"
  - "Purged CV: 1-month purge + 1-month embargo prevents label overlap and market-impact leakage across train/test folds"
  - "safe_shift(n>=1) assertion: impossible to construct a look-ahead factor — asserts n >= 1 at call time"
  - "T+1 fill via QBacktest: rebalance signal from month-end bar fills at next trading day open (inherited T+1 invariant)"
  - "Planted alpha disclosure: IC targets and formula locked in source; results honesty notice mandated in RESULTS.md"
dataset:
  name: "Synthetic 50-asset cross-sectional panel (planted alpha)"
  description: >
    50 assets × 60 months of monthly data (~2018–2023) generated by CrossSectionalGenerator
    with planted IC targets (momentum 0.06, value 0.04) and four negative controls (IC=0).
    Fully offline and deterministic with seed=42; 3% annual delist probability with OHLCV
    truncated at delist month (no NaN rows, no survivorship bias).
