project_id: '04'
title: "VolSurfaceLab — Implied Volatility Surface Calibration and Variance Risk Premium Analysis"
short_description: "A no-arbitrage SVI surface calibration and VRP harvesting pipeline with causal HAR/GARCH/EGARCH forecast comparison and standalone P&L accounting."
category: "Options / Volatility"
tags: ["SVI", "implied-volatility", "VRP", "GARCH", "HAR", "no-arbitrage", "options"]
demo_type: sim_svi
headline_metric:
  name: "IV round-trip error"
  value: "< 1e-6"
technical_overview:
  summary: >
    VolSurfaceLab tests whether implied volatility is a biased upward forecast of realized
    volatility and whether the resulting variance risk premium can be harvested net of costs.
    IVs are always solved from option mid-prices via LetsBeRational (py_vollib) with a brentq
    fallback; the ground-truth true_iv column is a test oracle only and never used as a pipeline
    input. SVI slices are calibrated under SLSQP with Gatheral-Jacquier butterfly and calendar
    constraints; violating slices are excluded rather than corrected. Three models (HAR-RV,
    GARCH(1,1), EGARCH(1,1)) forecast annualized realized variance and are compared via QLIKE
    loss (Patton 2011) and Diebold-Mariano test. A short delta-hedged ATM straddle captures
    the VRP with standalone P&L accounting independent of QBacktest.
  pipeline:
    - "SyntheticChainGenerator produces option chain from SVI parametric DGP (3 maturities, 13 strikes); generate_underlying_returns runs GARCH(1,1) path"
    - "solve_chain_iv invokes LetsBeRational + brentq fallback per strike; sign check gates brentq to avoid false roots"
    - "fit_svi_slice fits raw-SVI (a,b,rho,m,sigma) per maturity under SLSQP with butterfly + positivity constraints"
    - "validate_surface checks butterfly (g(k)>=0 on [-1.5,1.5]) and calendar (w_T1 < w_T2 pointwise) across all slice pairs"
    - "compare_forecasts trains HAR/GARCH/EGARCH on 67% of returns; GARCH labels by target date to avoid squared-return leakage"
    - "QLIKE and MSE computed on OOS split; Diebold-Mariano test with Newey-West HAC standard errors"
    - "run_vrp_strategy enters short delta-hedged ATM straddle; P&L = premium + gamma-scalp + theta - hedge costs"
    - "ReportBuilder writes smile plots, 3D surface, heatmap, QLIKE bar chart, and VRP P&L figure"
methodology:
  summary: >
    The honest IV path ensures IVs are always re-solved from prices, never read from a vendor
    column. The no-arbitrage gate excludes rather than corrects violating slices — a RuntimeError
    if all slices are excluded. GARCH forecast labels are indexed by target date (not origin date)
    to prevent squared-return leakage into evaluation. VRP is point-in-time: IV fixed at entry
    (before the period), RV proxy is realized squared return (after the period). Standalone
    P&L accounting does not route through QBacktest, making the strategy accountable on its own.
  key_techniques:
    - "IV solving: LetsBeRational (py_vollib) with brentq fallback and sign-check gate"
    - "SVI calibration: raw-SVI SLSQP with Gatheral-Jacquier butterfly + calendar constraints"
    - "No-arbitrage gate: exclude violating slices, do not correct"
    - "HAR-RV: Corsi (2009) daily/weekly/monthly RV components via statsmodels OLS"
    - "GARCH/EGARCH: target-date labeling prevents squared-return leakage"
    - "QLIKE loss: L(h,rv) = rv/h - log(rv/h) - 1 (Patton 2011); penalizes under-forecasting"
    - "Diebold-Mariano test: two-sided, Newey-West HAC standard errors"
    - "Standalone P&L: premium + continuous-hedging gamma P&L - theta credit - hedge costs"
correctness_guarantees:
  - "IV round-trip oracle: solved IV reproduces true_iv within < 1e-6 on all 78 validated rows (oracle test; true_iv is quarantined from the pipeline)"
  - "SVI no-arbitrage gate: butterfly constraint g(k) >= 0 on linspace(-1.5,1.5,200) and calendar constraint w_T1 < w_T2 pointwise enforced; violating slices excluded not corrected"
  - "Target-date GARCH labeling: GARCH forecast labels indexed by the target date (not origin date), preventing squared-return leakage into evaluation"
  - "true_iv quarantine: ground-truth true_iv column is a test oracle only and is never used as a pipeline input (leakage analog test)"
  - "Causal HAR-RV: only X[:t] used when forecasting at t; no future RV components in the regressor"
dataset:
  name: "Synthetic options chain + GARCH(1,1) underlying path"
  description: >
    Synthetic options chain generated from SVI parametric DGP (spot=100, r=5%, maturities T={0.25,0.5,1.0},
    13 log-moneyness strikes in [-1.5,1.5]); underlying returns from GARCH(1,1) (omega=2e-6, alpha=0.08,
    beta=0.90, ~16% long-run annualized vol), 750 days, seed=42. Fully offline and deterministic.
