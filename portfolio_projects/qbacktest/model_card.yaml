project_id: '01'
title: "QBacktest — Event-Driven Backtesting Engine"
short_description: "A deterministic, look-ahead-proof Python backtesting engine built around four structural correctness invariants."
category: "Backtesting Engine"
tags: ["event-driven", "backtesting", "T+1-fill", "walk-forward", "synthetic-data", "accounting-invariant"]
demo_type: sim_backtest
headline_metric:
  name: "Net Sharpe (demo)"
  value: "1.0164"
technical_overview:
  summary: >
    QBacktest is a Python event-driven backtesting library organized around a four-event pipeline
    (MarketEvent → SignalEvent → OrderEvent → FillEvent) that structurally enforces T+1 fill discipline:
    pending orders are flushed before the data cursor advances, making same-bar fills architecturally
    impossible. An accounting invariant (cash + book_value == initial_capital + cumulative_PnL)
    is checkable after any run. Walk-forward folds use isolated HistoricalDataHandler instances
    (no shared mutable state), and two runs with identical seed and config produce byte-identical
    equity curves. Demo runs use a synthetic OHLCV generator (seeded Geometric Brownian Motion)
    with a 20/50 SMA crossover strategy over three symbols, 504 daily bars, and a 10 bps slippage
    plus 10 bps commission cost model.
  pipeline:
    - "SyntheticOHLCVGenerator seeds per-symbol GBM paths (seed + i*1000), producing reproducible OHLCV frames"
    - "HistoricalDataHandler ingests per-symbol frames; get_latest_bars() gates look-ahead"
    - "_flush_pending_orders() fills buffered T orders at T+1 open before advancing cursor"
    - "data_handler.update_bars() advances cursor and emits MarketEvents"
    - "Strategy (MA crossover) consumes MarketEvents and emits SignalEvents"
    - "SimulatedExecutionHandler applies FixedSlippage + PercentageCommission, emits FillEvents"
    - "Portfolio updates cash and positions on each FillEvent; accounting invariant checkable at any point"
    - "TearsheetRenderer produces 3-panel PNG (equity curve, drawdown, monthly returns) and summary table"
methodology:
  summary: >
    The engine enforces correctness through four invariants rather than convention: T+1 fill order
    (structural, not checked at runtime), cash-plus-positions accounting (checkable after any fill),
    walk-forward fold isolation (construction-time, not reset-based), and seed-based determinism.
    The demo strategy is a 20/50 SMA crossover with no parameter tuning. Cost model is locked at
    10 bps slippage + 10 bps commission per trade. Bootstrap Sharpe confidence intervals use 1000
    resamples (percentile method) to quantify estimation uncertainty.
  key_techniques:
    - "T+1 fill invariant: flush before advance"
    - "Event queue drain: MARKET → SIGNAL → ORDER → FILL"
    - "Accounting invariant: cash + book_value == capital + cumPnL"
    - "Walk-forward isolation via separate HistoricalDataHandler instances per fold"
    - "Seeded per-symbol GBM for deterministic synthetic data"
    - "Bootstrap Sharpe 95% CI (1000 resamples, percentile)"
    - "Gross equity reconstruction: net_equity + cumulative_commission"
correctness_guarantees:
  - "Signal at bar T provably fills at T+1 open: _flush_pending_orders() runs before update_bars() in every iteration — structural, not tested"
  - "Accounting invariant: cash + book_value_of_positions == initial_capital + cumulative_PnL holds after every fill (oracle test: test_accounting_invariant)"
  - "Sentinel state-bleed test: walk-forward folds use fresh HistoricalDataHandler instances; no shared mutable state between train and test windows (oracle test: fold isolation)"
  - "Determinism oracle: two runs with identical seed and config produce byte-identical equity curves (test_determinism)"
  - "Gross Sharpe reconstruction oracle: net_equity + cumulative_commission reproduces gross equity within 1e-6 tolerance"
dataset:
  name: "Synthetic OHLCV (seeded GBM)"
  description: >
    Three symbols (AAPL, MSFT, GOOG) generated via SyntheticOHLCVGenerator with seeded per-symbol GBM
    (mu=0.0002 daily drift, sigma=0.015 daily vol, initial price 100.0, seed=42, n_bars=504).
    Fully offline and deterministic; no real market data is used.
