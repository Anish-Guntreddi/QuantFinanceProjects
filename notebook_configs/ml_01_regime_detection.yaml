project:
  id: ml_01_regime_detection
  category: ai_ml_trading
  dir_name: 01_regime_detection_allocation
  display_name: Regime Detection & Dynamic Allocation
  description: Multi-model regime detection (HMM, Markov-switching, clustering) with meta-policy dynamic strategy allocation
template: ml_trading
subcategory: Regime
asset_class: Multi-asset
frequency: Daily
languages:
- Python
simulation_tier: cached_sweep
synthetic_sharpe: 1.3
synthetic_vol: 0.12
source:
  sys_path_append: ml
  imports:
  - from regimes import BaseRegimeDetector
  key_class: BaseRegimeDetector
  additional_sys_paths:
  - policies
data:
  source_type: yfinance
  tickers:
  - SPY
  start_date: '2020-01-01'
  end_date: '2024-12-31'
  benchmark: SPY
params:
  num_regimes:
    default: 4
    range:
    - 2
    - 6
    type: int
    label: Number of Regimes
  lookback_days:
    default: 252
    range:
    - 60
    - 504
    type: int
    label: Lookback (days)
interactive_params:
- name: num_regimes
  label: Number of Regimes
  type: slider
  min: 2
  max: 6
  default: 4
  step: 1
- name: lookback_days
  label: Lookback (days)
  type: slider
  min: 60
  max: 504
  default: 252
  step: 21
tags:
- regime-detection
- hmm
- markov-switching
- dynamic-allocation
