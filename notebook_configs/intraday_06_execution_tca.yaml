project:
  id: intraday_06_execution_tca
  category: research_intraday_strategies
  dir_name: 06_execution_tca
  display_name: Execution & TCA Analysis
  description: VWAP/TWAP/POV execution with Almgren-Chriss and Propagator market impact models
template: intraday
subcategory: Execution
asset_class: Equities
frequency: Minute
languages:
- Python
- C++
has_cpp: true
simulation_tier: live
synthetic_sharpe: 0.8
synthetic_vol: 0.08
source:
  sys_path_append: src
  imports:
  - from execution_tca_strategy import ExecutionTcaStrategy, StrategyConfig
  key_class: ExecutionTcaStrategy
data:
  source_type: yfinance
  tickers:
  - SPY
  start_date: '2022-01-01'
  end_date: '2024-12-31'
  benchmark: SPY
params:
  lookback_period:
    default: 20
    range:
    - 5
    - 100
    type: int
    label: Lookback Period
  slippage:
    default: 0.0001
    range:
    - 0.0
    - 0.001
    type: float
    label: Slippage
  commission:
    default: 0.001
    range:
    - 0.0
    - 0.005
    type: float
    label: Commission
interactive_params:
- name: lookback_period
  label: Lookback Period
  type: slider
  min: 5
  max: 100
  default: 20
  step: 5
tags:
- execution
- tca
- vwap
- market-impact
- almgren-chriss
