    default: 50.0
    range:
    - 10.0
    - 200.0
    type: float
    label: Arrival Rate
  cancel_latency_us:
    default: 50
    range:
    - 10
    - 200
    type: int
    label: Cancel Latency (us)
interactive_params:
- name: arrival_rate
  label: Arrival Rate
  type: slider
  min: 10.0
  max: 200.0
