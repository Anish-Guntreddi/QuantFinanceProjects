  description: SIMD-optimized nowcast engine for sub-microsecond next-tick direction predictions using order flow features
template: hft
subcategory: Signal
asset_class: Equities
frequency: Tick-level
languages:
- Python
- C++
has_cpp: true
simulation_tier: precomputed
