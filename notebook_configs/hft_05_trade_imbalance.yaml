  imports:
  - from trade_imbalance import TradeImbalancePredictor
  key_class: TradeImbalancePredictor
data:
  source_type: synthetic
  start_date: '2024-01-01'
  end_date: '2024-12-31'
params:
  threshold_bps:
    default: 1.0
    range:
    - 0.1
    - 5.0
    type: float
    label: Threshold (bps)
interactive_params:
- name: threshold_bps
  label: Threshold (bps)
  type: slider
  min: 0.1
  max: 5.0
