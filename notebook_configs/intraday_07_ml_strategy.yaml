project:
  id: intraday_07_ml_strategy
  category: research_intraday_strategies
  dir_name: 07_machine_learning_strategy
  display_name: Machine Learning Trading Strategy
  description: LSTM and Transformer forecasting with 50+ features, embargoed CV, probability calibration, and feature selection
template: intraday
subcategory: Machine Learning
asset_class: Equities
frequency: Daily
languages:
- Python
requires_gpu: true
simulation_tier: cached_sweep
synthetic_sharpe: 1.1
synthetic_vol: 0.14
source:
  sys_path_append: src
  imports:
  - from machine_learning_strategy import MachineLearningStrategy, StrategyConfig
  key_class: MachineLearningStrategy
data:
  source_type: yfinance
  tickers:
  - SPY
  start_date: '2018-01-01'
  end_date: '2024-12-31'
  benchmark: SPY
params:
  lookback_period:
    default: 60
    range:
    - 20
    - 120
    type: int
    label: Lookback Period
  stop_loss:
    default: 0.02
    range:
    - 0.005
    - 0.05
    type: float
    label: Stop Loss
  slippage:
    default: 0.0001
    range:
    - 0.0
    - 0.001
    type: float
    label: Slippage
  commission:
    default: 0.001
    range:
    - 0.0
    - 0.005
    type: float
    label: Commission
interactive_params:
- name: lookback_period
  label: Lookback Period
  type: slider
  min: 20
  max: 120
  default: 60
  step: 10
tags:
- machine-learning
- lstm
- transformer
- feature-selection
- calibration
