project:
  id: intraday_03_stat_arb
  category: research_intraday_strategies
  dir_name: 03_statistical_arbitrage
  display_name: Intraday Statistical Arbitrage
  description: Cointegration-based intraday pairs trading with Engle-Granger and Johansen tests and dynamic hedge ratios
template: intraday
subcategory: Statistical Arbitrage
asset_class: Equities
frequency: Daily
languages:
- Python
simulation_tier: live
synthetic_sharpe: 1.3
synthetic_vol: 0.1
source:
  sys_path_append: src
  imports:
  - from statistical_arbitrage_strategy import StatisticalArbitrageStrategy, StrategyConfig
  key_class: StatisticalArbitrageStrategy
data:
  source_type: yfinance
  tickers:
  - SPY
  - IVV
  start_date: '2020-01-01'
  end_date: '2024-12-31'
  benchmark: SPY
params:
  lookback_period:
    default: 60
    range:
    - 20
    - 252
    type: int
    label: Lookback Period
  stop_loss:
    default: 0.02
    range:
    - 0.005
    - 0.05
    type: float
    label: Stop Loss
  slippage:
    default: 0.0001
    range:
    - 0.0
    - 0.001
    type: float
    label: Slippage
  commission:
    default: 0.001
    range:
    - 0.0
    - 0.005
    type: float
    label: Commission
interactive_params:
- name: lookback_period
  label: Lookback Period
  type: slider
  min: 20
  max: 252
  default: 60
  step: 10
tags:
- statistical-arbitrage
- pairs-trading
- cointegration
- intraday
