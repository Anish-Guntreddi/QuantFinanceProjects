project:
  id: intraday_05_options
  category: research_intraday_strategies
  dir_name: 05_options_strategy
  display_name: Options Strategy Suite
  description: Earnings straddles, covered calls, and IV-RV spread trading with Greeks-based PnL attribution
template: intraday
subcategory: Options
asset_class: Options
frequency: Daily
languages:
- Python
simulation_tier: live
synthetic_sharpe: 0.9
synthetic_vol: 0.18
source:
  sys_path_append: src
  imports:
  - from options_strategy import OptionsStrategy, StrategyConfig
  key_class: OptionsStrategy
data:
  source_type: yfinance
  tickers:
  - SPY
  start_date: '2020-01-01'
  end_date: '2024-12-31'
  benchmark: SPY
params:
  lookback_period:
    default: 20
    range:
    - 5
    - 100
    type: int
    label: Lookback Period
  stop_loss:
    default: 0.03
    range:
    - 0.01
    - 0.1
    type: float
    label: Stop Loss
  slippage:
    default: 0.0001
    range:
    - 0.0
    - 0.001
    type: float
    label: Slippage
  commission:
    default: 0.001
    range:
    - 0.0
    - 0.005
    type: float
    label: Commission
interactive_params:
- name: lookback_period
  label: IV Lookback
  type: slider
  min: 5
  max: 100
  default: 20
  step: 5
tags:
- options
- straddle
- covered-call
- iv-rv
- greeks
