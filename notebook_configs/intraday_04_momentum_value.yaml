project:
  id: intraday_04_momentum_value
  category: research_intraday_strategies
  dir_name: 04_momentum_value_long_short
  display_name: Momentum-Value Long/Short
  description: Cross-sectional ranking combining momentum and value signals with market cap and sector neutralization
template: intraday
subcategory: Long-Short
asset_class: Equities
frequency: Daily
languages:
- Python
simulation_tier: live
synthetic_sharpe: 1.0
synthetic_vol: 0.14
source:
  sys_path_append: src
  imports:
  - from momentum_value_long_short_strategy import MomentumValueLongShortStrategy, StrategyConfig
  key_class: MomentumValueLongShortStrategy
data:
  source_type: yfinance
  tickers:
  - SPY
  start_date: '2020-01-01'
  end_date: '2024-12-31'
  benchmark: SPY
params:
  lookback_period:
    default: 60
    range:
    - 20
    - 252
    type: int
    label: Lookback Period
  stop_loss:
    default: 0.03
    range:
    - 0.01
    - 0.1
    type: float
    label: Stop Loss
  slippage:
    default: 0.0001
    range:
    - 0.0
    - 0.001
    type: float
    label: Slippage
  commission:
    default: 0.001
    range:
    - 0.0
    - 0.005
    type: float
    label: Commission
interactive_params:
- name: lookback_period
  label: Lookback Period
  type: slider
  min: 20
  max: 252
  default: 60
  step: 10
tags:
- momentum-value
- long-short
- cross-sectional
- neutralization
