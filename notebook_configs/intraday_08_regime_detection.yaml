project:
  id: intraday_08_regime_detection
  category: research_intraday_strategies
  dir_name: 08_regime_detection_allocation
  display_name: Regime Detection & Allocation
  description: HMM and clustering-based regime detection with dynamic strategy allocation and Hurst exponent analysis
template: intraday
subcategory: Regime Detection
asset_class: Equities
frequency: Daily
languages:
- Python
simulation_tier: cached_sweep
synthetic_sharpe: 1.0
synthetic_vol: 0.13
source:
  sys_path_append: src
  imports:
  - from regime_detection_allocation_strategy import RegimeDetectionAllocationStrategy, StrategyConfig
  key_class: RegimeDetectionAllocationStrategy
data:
  source_type: yfinance
  tickers:
  - SPY
  start_date: '2018-01-01'
  end_date: '2024-12-31'
  benchmark: SPY
params:
  lookback_period:
    default: 252
    range:
    - 60
    - 504
    type: int
    label: Lookback Period
  stop_loss:
    default: 0.03
    range:
    - 0.01
    - 0.1
    type: float
    label: Stop Loss
  slippage:
    default: 0.0001
    range:
    - 0.0
    - 0.001
    type: float
    label: Slippage
  commission:
    default: 0.001
    range:
    - 0.0
    - 0.005
    type: float
    label: Commission
interactive_params:
- name: lookback_period
  label: Lookback Period
  type: slider
  min: 60
  max: 504
  default: 252
  step: 21
tags:
- regime-detection
- hmm
- clustering
- hurst-exponent
- dynamic-allocation
