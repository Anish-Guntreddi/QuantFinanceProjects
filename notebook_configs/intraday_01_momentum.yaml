project:
  id: intraday_01_momentum
  category: research_intraday_strategies
  dir_name: 01_momentum_trend_following
  display_name: Momentum & Trend Following
  description: EMA/SMA crossover, breakout detection, and multi-timeframe momentum with RSI and MACD confirmation
template: intraday
subcategory: Momentum
asset_class: Equities
frequency: Daily
languages:
- Python
simulation_tier: live
synthetic_sharpe: 1.2
synthetic_vol: 0.15
source:
  sys_path_append: src
  imports:
  - from momentum_strategy import MomentumTrendFollowingStrategy, StrategyConfig
  key_class: MomentumTrendFollowingStrategy
data:
  source_type: yfinance
  tickers:
  - SPY
  start_date: '2020-01-01'
  end_date: '2024-12-31'
  benchmark: SPY
params:
  lookback_period:
    default: 20
    range:
    - 5
    - 100
    type: int
    label: Lookback Period
  stop_loss:
    default: 0.02
    range:
    - 0.005
    - 0.05
    type: float
    label: Stop Loss
  slippage:
    default: 0.0001
    range:
    - 0.0
    - 0.001
    type: float
    label: Slippage
  commission:
    default: 0.001
    range:
    - 0.0
    - 0.005
    type: float
    label: Commission
interactive_params:
- name: lookback_period
  label: Lookback Period
  type: slider
  min: 5
  max: 100
  default: 20
  step: 5
- name: stop_loss
  label: Stop Loss
  type: slider
  min: 0.005
  max: 0.05
  default: 0.02
  step: 0.005
tags:
- momentum
- trend-following
- sma-crossover
- rsi
- macd
