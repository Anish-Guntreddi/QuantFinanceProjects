project:
  id: research_02_event_backtester
  category: core_research_backtesting
  dir_name: 02_event_driven_backtester
  display_name: Event-Driven Backtesting Engine
  description: High-performance backtesting with event queue, realistic costs, walk-forward validation, and vectorized acceleration
template: backtesting
subcategory: Backtesting Framework
asset_class: Equities
frequency: Daily
languages:
- Python
simulation_tier: live
synthetic_sharpe: 1.0
synthetic_vol: 0.15
source:
  sys_path_append: engine
  imports:
  - from core.event import Event, MarketEvent
  - from core.portfolio import Portfolio
  key_class: Portfolio
data:
  source_type: yfinance
  tickers:
  - SPY
  start_date: '2020-01-01'
  end_date: '2024-12-31'
  benchmark: SPY
params:
  initial_capital:
    default: 100000
    range:
    - 10000
    - 1000000
    type: int
    label: Initial Capital
  commission_bps:
    default: 10
    range:
    - 1
    - 50
    type: int
    label: Commission (bps)
interactive_params:
- name: commission_bps
  label: Commission (bps)
  type: slider
  min: 1
  max: 50
  default: 10
  step: 1
tags:
- event-driven
- backtesting
- walk-forward
- vectorized
